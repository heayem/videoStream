<!-- public/watch.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watching Video</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; font-family: system-ui, sans-serif; color: white; display:flex; flex-direction:column; align-items:center; }
    .player-container { width: 100%; max-width: 1200px; padding: 2rem; box-sizing: border-box; }
    video { width: 100%; aspect-ratio: 16/9; background: black; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5); }
    .controls { margin-top: 1rem; padding: 1rem; background: #1e293b; border-radius: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
    .quality-controls button { background: #334155; color: white; border: none; padding: 0.5rem 1rem; margin-left: 0.5rem; border-radius: 0.25rem; cursor: pointer; }
    .quality-controls button:hover { background: #475569; }
    .quality-controls button.active { background: #38bdf8; color: #0f172a; font-weight: bold; }
    .back-btn { background: transparent; color: #cbd5e1; border: 1px solid #475569; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    .back-btn:hover { background: #334155; color: white; }
</style>
</head>
<body>
<div class="player-container">
  <a href="/" class="back-btn">← Back to Videos</a>
  <video id="videoPlayer" controls autoplay playsinline></video>
  <div class="controls">
    <h1 id="videoTitle"></h1>
    <div id="qualityControls" class="quality-controls"></div>
  </div>
</div>
<script>
const videoId = window.location.pathname.split('/').pop();
fetch(`/api/videos/${videoId}`)
  .then(res => res.json())
  .then(video => {
      document.getElementById('videoTitle').innerText = video.title || video.id;
      const videoEl = document.getElementById('videoPlayer');
      const src = '/stream/' + videoId + '/master.m3u8';

      if(Hls.isSupported()){
          const hls = new Hls({ capLevelToPlayerSize:true });
          hls.loadSource(src);
          hls.attachMedia(videoEl);
          window.currentHls = hls;

          hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
              const qc = document.getElementById('qualityControls');
              let html = '<button class="active" onclick="window.currentHls.currentLevel=-1">Auto</button>';
              hls.levels.forEach((level,index)=> html += '<button onclick="window.currentHls.currentLevel='+index+'">'+level.height+'p</button>');
              qc.innerHTML = html;
              qc.addEventListener('click', e=>{
                  if(e.target.tagName==='BUTTON'){
                      Array.from(qc.children).forEach(btn=>btn.classList.remove('active'));
                      e.target.classList.add('active');
                  }
              });
          });
      } else if(videoEl.canPlayType('application/vnd.apple.mpegurl')){
          videoEl.src = src;
      }
  });
</script>
</body>
</html>
